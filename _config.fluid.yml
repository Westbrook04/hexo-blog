#---------------------------
# Hexo Theme Fluid 配置
#---------------------------

# 导航栏
navbar:
  blog_title: "West Blog"
  ground_glass:
    enable: true

menu:
  - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
  - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
  - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
  - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
  - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }

# 首页
index:
  banner_img: /img/default.png
  banner_img_height: 70
  banner_mask_alpha: 0.3
  per_page: 10
  slogan:
    enable: true
    text: "记录技术与生活"

# 文章页
post:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 归档页
archive:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 分类页
category:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 标签页
tag:
  enable: true
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 关于页
about:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.3

# 暗色模式
dark_mode:
  enable: true
  default: auto

# 代码高亮
code:
  highlight:
    lib: "highlightjs"
  copy_btn: true

# 打字机效果
fun_features:
  typing:
    enable: true
    typeSpeed: 70
    cursorChar: "_"
    loop: false

# 社交链接
social:
  - { title: "GitHub", icon: "iconfont icon-github-fill", link: "https://github.com/Westbrook04" }

# 页脚
footer:
  content: |
    &copy; 2026 My Blog. All rights reserved.

custom_js:
  - /js/post-translate.js

custom_css:
  - /css/post-translate.css

# Mermaid 图表
mermaid:
  enable: true
  theme: default
